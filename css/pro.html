<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaya krishna Portfolio</title>
    <link href="jaya.css" rel="stylesheet">
</head>

<body>

    <!-- Header -->
    <header id="header">
        <h1> Jaya krishnaPortfolio</h1>
        <nav>
            <a href="#about">About</a>
            <a href="#skills">Skills</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>
       <!-- About Section -->
        <div class="about">

            <img src="jaya.jpeg" alt="Profile picture of the user" width="150px" height="150px">
            <p id="para">
                Hello! I am a beginner web developer learning HTML, CSS, and JavaScript.<br>
                I enjoy building simple and clean websites.
            </p>

            
       </div>

        <!-- Skills Section -->
        <div class="skills">
            <h2>My Skills</h2>
            
            <ul>
                <li>HTML</li>
                <li>CSS</li>
                <li>JavaScript</li>
            </ul>
        </div>
      

        <!-- Contact Section -->
        <div class="contact">
            <h2>Contact Me</h2>
            

            
                
                <label for="name">Name:</label><br>
                <input type="text" id="name" name="name" required><br><br>

                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" required><br><br>

                <label for="message">Message:</label><br>
                <textarea id="message" name="message" rows="4" required></textarea><br><br>

                <button type="submit">Send</button>
            
        </div>

    </main>

    <!-- Footer -->
    <footer class="footer">
        <p id ="para">&copy; 2026 My Portfolio. All rights reserved.</p>
    </footer>

</body>
</html>
